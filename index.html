<!-- POPUP KERANJANG -->
<!-- ========================= -->

<div class="popup-bg hidden" id="popupBg">

    <div class="cart-sidebar">

        <!-- HEADER -->
        <div class="cart-header">

            <h2>Keranjang</h2>

            <span id="closePopup">&times;</span>

        </div>

        <!-- LIST ITEM -->
        <div id="cart-list"></div>

        <!-- FOOTER -->
        <div class="cart-footer">

            <div class="cart-info">
                <span>Total Item</span>
                <span id="total-item">0</span>
            </div>

            <div class="cart-info">
                <span>Total Harga</span>
                <span id="total-price">Rp 0</span>
            </div>

            <button class="pay-btn" onclick="bukaPembayaran()">
                Bayar (<span id="pay-total-item">0</span>)
            </button>

            <button class="clear-btn" onclick="kosongkanKeranjang()">
                Kosongkan Keranjang
            </button>

        </div>

    </div>

</div>


<!-- ========================= -->
<!-- POPUP PEMBAYARAN -->
<!-- ========================= -->

<div class="payment-popup hidden" id="paymentPopup">

    <div class="payment-card">

        <!-- HEADER -->
        <div class="payment-header">

            <h2>Pembayaran</h2>

            <span onclick="tutupPembayaran()">&times;</span>

        </div>

        <div class="payment-body">

            <!-- RINGKASAN -->
            <div class="payment-summary">

                <h4>Ringkasan Pesanan</h4>

                <div id="payment-items"></div>

                <div class="payment-total">
                    <span>Total</span>
                    <span id="payment-total-price">
                        Rp 0
                    </span>
                </div>

            </div>

            <!-- METODE -->
            <div class="payment-method">

                <h4>Metode Pembayaran</h4>

                <label class="method-card active">
                    <input type="radio" name="payment" checked>
                    Tunai (Cash)
                </label>

                <label class="method-card">
                    <input type="radio" name="payment">
                    Debit / Kredit
                </label>

                <label class="method-card">
                    <input type="radio" name="payment">
                    QRIS
                </label>

                <button class="pay-now-btn" onclick="prosesPembayaran()">
                    Bayar Sekarang
                </button>

            </div>

        </div>

    </div>

</div>
